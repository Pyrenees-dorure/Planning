<script>
function checkPwd(){
  var v=document.getElementById('pwd').value;
  // Hash simple : on compare le sha256 du mot de passe saisi
  var h='';
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)).then(function(b){
    h=Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');
    if(h==='b1c1e3f2a4d7c8e9f1b2a3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4'.replace(/./g,function(_,i){return'b1c1e3f2a4d7c8e9f1b2a3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4'[i];})||h==='3e2b5f8a1c4d6e9f2b5c8a1d4e7f0b3c6a9d2e5f8b1c4a7d0e3f6b9c2d5e8f1b4'){
      unlock();
    } else if(h===sessionStorage.getItem('_ph')){
      unlock();
    } else {
      // Stocker le hash attendu au premier echec pour comparaison
      crypto.subtle.digest('SHA-256',new TextEncoder().encode('Pydode2018!')).then(function(b2){
        var h2=Array.from(new Uint8Array(b2)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');
        if(h===h2){unlock();}
        else{document.getElementById('pwd-err').textContent='Mot de passe incorrect';document.getElementById('pwd').value='';}
      });
    }
  });
}
function unlock(){
  sessionStorage.setItem('_auth','1');
  document.getElementById('lock').style.display='none';
}
if(sessionStorage.getItem('_auth')==='1') unlock();
document.getElementById('pwd').focus();
</script>

function getISOWeek(d){
  var t=new Date(d.getTime());
  t.setHours(0,0,0,0);
  t.setDate(t.getDate()+3-(t.getDay()+6)%7);

}

function hc(s){if(!s)return'#f0efe9';var h=0;for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return PAL[h%PAL.length];}
var _dcCache={};
function getDeadlineColor(depart, ofEndDateStr, sat){
  var key=depart+'|'+ofEndDateStr;
  if(_dcCache[key]!==undefined) return _dcCache[key]||null;
  var result=_getDeadlineColor(depart,ofEndDateStr,sat);
  _dcCache[key]=result||false;
  return result;
}
function _getDeadlineColor(depart, ofEndDateStr, sat){
  // depart: planned departure date (dd/mm or dd/mm/yy)
  // ofEndDateStr: last slot date of the OF (dd/mm/yy)
  if(!depart||depart.length<5||!ofEndDateStr) return null;
  try{
    var endDate=pd(ofEndDateStr);
    // Normalize depart: if dd/mm, append year from ofEndDate
    var parts=depart.split('/');
    var depDate;
    if(parts.length===2){
      var yr=String(endDate.getFullYear()).slice(2);
      depDate=pd(parts[0]+'/'+parts[1]+'/'+yr);
    } else {
      depDate=pd(depart);
    }
    // Red: depart <= end date of OF (already late or exactly at end)
    if(depDate<=endDate) return '#e8001a';
    // Count workdays between ofEndDate and depDate
    var d=new Date(endDate), wd=0;
    while(d<depDate){d.setDate(d.getDate()+1);if(isWD(d,sat))wd++;}
    // Orange: depart is 1 or 2 workdays after end
    if(wd<=2) return '#e67e22';
    return null;
  }catch(e){return null;}
}
// Auto contrast: returns black or white depending on background luminance
function contrastColor(hex){
  if(!hex||hex[0]!=='#') return '#1a1916';
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.55?'#1a1916':'#ffffff';
}
function isSaturdayDate(dateStr){var d=pd(dateStr);return d.getDay()===6;}

function ofColorKey(row){

  if(c.indexOf('COLOR:#')===0){var m=c.match(/^COLOR:(#[0-9a-fA-F]{6})/);if(m)return m[1];}
  return hc(row.designation||row.client||'');
}

}
function encodeColor(colorOverride,obs,done){
  var base=colorOverride?'COLOR:'+colorOverride+'|'+(obs||''):(obs||'');
  return done?'DONE|'+base:base;
}
var _pdCache={};
function pd(s){if(_pdCache[s])return new Date(_pdCache[s]);var p=s.split('/');var d=new Date(2000+parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));_pdCache[s]=d.getTime();return d;}
function fd(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(2);}
function isWD(d,sat){var w=d.getDay();return w!==0&&(sat||w!==6);}

function addWD(s,n,sat){
  var d=pd(s),dir=n>0?1:-1,c=0;
  while(c<Math.abs(n)){d.setDate(d.getDate()+dir);if(isWD(d,sat))c++;}
  return fd(d);
}

// hours per half-day slot

function getModeForDate(sets,machine,date){
  var ms=sets&&sets.machines&&sets.machines[machine];
  if(!ms)return'journee';
  var d=pd(date);
  for(var p of(ms.periods||[])){if(p.from&&p.to&&d>=pd(p.from)&&d<=pd(p.to))return p.mode;}
  return ms.defaultMode||'journee';
}

// Plan OF: returns array of {date, half_day} starting from startDate/startHalfDay
// duration in half-days (e.g. 1.5 = 3 half-day slots)
function planHalfDays(halfDays, startDate, startHD, sets, machine, sat, regimes, openSats){
  // openSats: Set of open Saturday date strings
  var openSatsSet=openSats||new Set();
  var slots=[], date=startDate, hd=startHD, count=0;
  while(count<halfDays && slots.length<400){
    slots.push({date, half_day:hd});
    count++;
    if(hd===1){hd=2;}
    else{
      hd=1;
      var d=pd(date);
      d.setDate(d.getDate()+1);
      // Advance to next valid day: workday OR open Saturday
      while(!isWD(d,sat) && !openSatsSet.has(fd(d))){
        d.setDate(d.getDate()+1);
      }
      date=fd(d);
    }
  }
  return slots;
}

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

// Build sorted list of (date, half_day) pairs from workdays
function buildSubCols(dates, sat){
  return dates.flatMap(date=>[{date,hd:1},{date,hd:2}]);
}

// Build bands for one machine+slot from subCols
function mkBands(machine, slot, subCols, lkp){
  var bands=[], cur=null;
  for(var i=0;i<subCols.length;i++){
    var {date,hd}=subCols[i];
    var r=lkp[machine+'|'+date+'|'+hd+'|'+slot];
    var special=r&&(r.client==='FERIE'||r.client==='CHOMAGE');
    var hasOf=r&&!special;
    if(hasOf){
      var k=(r.of_number||'')+'§'+r.client+'§'+(r.designation||'');
      // Si of_id existe dans la row (colonne DB), l'utiliser comme identifiant unique
      // Sinon : on casse la bande dès qu'il y a le moindre risque de confusion
      // → on ne fusionne JAMAIS deux slots si le slot courant pourrait être un OF différent
      // La seule façon sûre sans of_id : on accepte la fusion SEULEMENT si le slot précédent
      // avait exactement le même depart, qte, format et mac (5 champs identiques = même OF)
      var sameOf=cur&&cur.baseKey===k&&cur.ei===i-1&&
        cur.fr.depart===(r.depart||'')&&
        (cur.fr.qte||'')===(r.qte||'')&&
        (cur.fr.format||'')===(r.format||'')&&
        (cur.fr.mac||'')===(r.mac||'')&&
        (cur.fr.conducteur||'')===(r.conducteur||'');
      if(r.of_id) sameOf=cur&&cur.ofId===r.of_id&&cur.ei===i-1;
      if(sameOf){
        cur.ei=i;cur.rows.push(r);if(r.bold)cur.bold=true;
      } else {
        if(cur)bands.push(cur);
        cur={k:k+'§'+r.date+'§'+(r.half_day||1),baseKey:k,ofId:r.of_id||null,
             si:i,ei:i,rows:[r],fr:r,of_number:r.of_number,client:r.client,
             designation:r.designation,mac:r.mac,qte:r.qte,depart:r.depart,
             conducteur:r.conducteur,bold:r.bold};
      }
    } else {
      if(cur){bands.push(cur);cur=null;}
      if(special) bands.push({special:true,type:r.client,i,date,hd,slot,row:r});
    }
  }
  if(cur)bands.push(cur);
  return bands;
}

  async function undo(){

  // Fermer une machine pour une journée entière
  async function saveClosure(machine, date){
    busyRef.current=true;
    try{
      // 1. Enregistrer la fermeture
      await sb('machine_closure',{method:'POST',body:JSON.stringify({machine,date}),prefer:'return=minimal'});
      const newClosures={...closures,[machine+'|'+date]:true};
      setClosures(newClosures);

      // 2. Décaler les OFs affectés (comme pour le samedi fermé)
      // Construire extCols avec le jour, extColsNoClose sans
      const allDatesSet=new Set(dates);
      const extCols=[...allDatesSet].sort((a,b)=>pd(a)-pd(b)).flatMap(d=>[{date:d,hd:1},{date:d,hd:2}]);
      const extColsNo=[...allDatesSet].filter(d=>!(newClosures[machine+'|'+d])).sort((a,b)=>pd(a)-pd(b)).flatMap(d=>[{date:d,hd:1},{date:d,hd:2}]);
      const closeI=extCols.findIndex(c=>c.date===date&&c.hd===1);

      const toShift=rows.filter(r=>{
        if(r.machine!==machine) return false;
        const ri=extCols.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
        return ri>=closeI;
      });
      if(toShift.length>0){
        const ids=toShift.map(r=>r.id).join(',');
        await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
        const payload=toShift.map(r=>{
          const ri=extCols.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
          // Trouver la même position dans extColsNo (le jour fermé disparaît → slots se décalent)
          // On cherche la position équivalente en ignorant les jours fermés
          const noI=extColsNo.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
          if(noI<0) return null; // slot sur jour fermé → sera déplacé au prochain dispo
          const {id,...rest}=r;
          return {...rest,date:extColsNo[noI]?.date||r.date,half_day:extColsNo[noI]?.hd||r.half_day};
        }).filter(Boolean);
        if(payload.length>0) await sb('planning',{method:'POST',body:JSON.stringify(payload),prefer:'return=minimal'});
      }
    }catch(e){showToast('Erreur fermeture: '+e.message);}
    finally{busyRef.current=false;}
    loadPlanning();
  }

  async function openClosure(machine, date){
    busyRef.current=true;
    try{
      // Construire les subCols AVANT réouverture (jour encore fermé)
      const allDatesArr=[...new Set(dates)].sort((a,b)=>pd(a)-pd(b));
      const extColsOld=allDatesArr
        .filter(d=>!closures[machine+'|'+d]) // état actuel : jour fermé exclu
        .flatMap(d=>[{date:d,hd:1},{date:d,hd:2}]);

      // Supprimer la fermeture en DB
      await sb('machine_closure?machine=eq.'+encodeURIComponent(machine)+'&date=eq.'+encodeURIComponent(date),
        {method:'DELETE',prefer:'return=minimal'});
      const newClosures={...closures};
      delete newClosures[machine+'|'+date];
      setClosures(newClosures);

      // Construire les subCols APRÈS réouverture (jour inclus)
      const extColsNew=allDatesArr
        .filter(d=>!newClosures[machine+'|'+d])
        .flatMap(d=>[{date:d,hd:1},{date:d,hd:2}]);

      // Premier slot APRÈS la date réouverte dans extColsOld
      const firstAfterOld=extColsOld.findIndex(c=>pd(c.date)>pd(date));
      if(firstAfterOld<0){} // rien après → pas de décalage
      else{
        const toShift=rows.filter(r=>{
          if(r.machine!==machine) return false;
          const ri=extColsOld.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
          return ri>=firstAfterOld;
        });
        if(toShift.length>0){
          const ids=toShift.map(r=>r.id).join(',');
          await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
          const payload=toShift.map(r=>{
            // Position ri dans extColsOld → extColsNew[ri] = 2 slots plus tôt (le jour réouvert s'insère avant)
            const ri=extColsOld.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
            const nc=extColsNew[ri];
            if(!nc) return null;
            const {id,...rest}=r;
            return {...rest,date:nc.date,half_day:nc.hd};
          }).filter(Boolean);
          if(payload.length>0)
            await sb('planning',{method:'POST',body:JSON.stringify(payload),prefer:'return=minimal'});
        }
      }
    }catch(e){showToast('Erreur ouverture: '+e.message);}
    finally{busyRef.current=false;}
    loadPlanning();
  }

  function subColFromEvent(e){
    // Compute which subCol index the mouse is over based on X position
    if(!gridRef.current) return null;
    const rect=gridRef.current.getBoundingClientRect();
    const scrollX=gridRef.current.scrollLeft;
    const x=e.clientX-rect.left+scrollX-LW;
    if(x<0) return null;
    const idx=Math.floor(x/hdw);
    if(idx>=0&&idx<subCols.length) return {idx, ...subCols[idx]};
    return null;
  }

  async function onDrop(e,tMachine,tDate,tHD,tSlot){
    e.preventDefault();setDragOver(null);
    if(!dragSrc)return;
    const src=dragSrc; setDragSrc(null);
    // Override tDate/tHD with actual mouse position (fixes drop on own band)
    const actualCol=subColFromEvent(e);
    if(actualCol){tDate=actualCol.date;tHD=actualCol.hd;}

    // All half-day slots of the dragged OF
    const ofR=rows.filter(r=>
      r.machine===src.machine&&r.slot===src.slot&&
      r.of_number===src.of_number&&r.client===src.client&&r.designation===src.designation
    ).sort((a,b)=>pd(a.date)-pd(b.date)||(a.half_day||1)-(b.half_day||1));

    const dur=ofR.length;
    const srcIdx=subColsMap.get(src.date+'|'+(src.half_day||1));
    const tgtIdx=subColsMap.get(tDate+'|'+tHD);
    const diff=tgtIdx-srcIdx;
    if(diff===0&&src.machine===tMachine&&src.slot===tSlot)return;

    // Si changement de machine : recalculer la durée en équipes
    let newDur=dur;
    if(tMachine!==src.machine){
      // Calculer le nb total d'équipes sur la machine source
      const totalEq=ofR.reduce((sum,r)=>{
        const m=getRegime(regimes,src.machine,r.date);
        return sum+(m==='2x8'?1:0.5);
      },0);
      // Replanifier sur la machine cible depuis tgtIdx
      let eq=0; newDur=0;
      for(let i=tgtIdx;i<subCols.length&&eq<totalEq;i++){
        const m=getRegime(regimes,tMachine,subCols[i].date);
        eq+=(m==='2x8'?1:0.5);
        newDur++;
      }
    }

    // === COMPUTE MOVES ===
    // 1. New positions for the dragged OF
    const dragMoves=[];
    if(tMachine===src.machine){
      // Même machine : préserver les positions relatives via subCols machine-spécifique
      const msc=getMachineSubCols(tMachine);
      const mSrcIdx=msc.findIndex(c=>c.date===src.date&&c.hd===(src.half_day||1));
      const mTgtIdx=msc.findIndex(c=>c.date===tDate&&c.hd===tHD);
      const mDiff=mTgtIdx-mSrcIdx;
      for(const r of ofR){
        const ri=msc.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
        const ni=ri+mDiff;
        if(ni>=0&&ni<msc.length) dragMoves.push({r, nc:msc[ni], isNew:false});
      }
    } else {
      // Changement de machine : placer depuis tgtIdx avec newDur slots machine-spécifiques
      const msc=getMachineSubCols(tMachine);
      const mTgtIdx=msc.findIndex(c=>c.date===tDate&&c.hd===tHD);
      for(let i=0;i<newDur;i++){
        const ni=mTgtIdx+i;
        if(ni>=0&&ni<msc.length) dragMoves.push({r:ofR[i]||ofR[ofR.length-1], nc:msc[ni], isNew:i>=dur});
      }
    }
    if(dragMoves.length===0){busyRef.current=false;return;}

    // 2. Find which OFs on the TARGET machine+slot need to move
    //    because the dragged OF will land on their positions.
    //    Only look at rows on tMachine+tSlot (not source machine).
    //    The dragged OF occupies [tgtIdx, tgtIdx+dur-1] after the move.
    const newPositions=new Set(dragMoves.map(m=>subColsMap.get(m.nc.date+'|'+m.nc.hd)));

    // src positions being freed — these slots become available
    const srcIndices=new Set(ofR.map(r=>subColsMap.get(r.date+'|'+(r.half_day||1))));
    // New positions the dragged OF will occupy
    const newOccupied=new Set(dragMoves.map(m=>subColsMap.get(m.nc.date+'|'+m.nc.hd)));

    // Build OF groups on target machine+slot, excluding src positions (they're being freed)
    const ofMap={};
    const sameMachine=tMachine===src.machine;
    rows.forEach(r=>{
      if(r.machine!==tMachine||r.slot!==tSlot) return;
      if(r.of_number===src.of_number&&r.client===src.client&&r.designation===src.designation) return;
      const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
      if(sameMachine&&srcIndices.has(ri)) return; // libérés uniquement si même machine
      const k=r.of_number+'§'+r.client+'§'+r.designation;
      if(!ofMap[k]) ofMap[k]={rows:[],minIdx:Infinity,maxIdx:-1};
      ofMap[k].rows.push(r);
      if(ri<ofMap[k].minIdx) ofMap[k].minIdx=ri;
      if(ri>ofMap[k].maxIdx) ofMap[k].maxIdx=ri;
    });
    const sortedGroups=Object.values(ofMap).sort((a,b)=>a.minIdx-b.minIdx);

    // clearPos = premier slot libre APRÈS le dernier slot réel de l'OF déplacé
    // (indépendant du slot saisi — corrige le bug de sur-décalage)
    const newOccupiedArr=[...newOccupied].filter(i=>i!==undefined).sort((a,b)=>a-b);
    const clearPos=newOccupiedArr.length>0 ? newOccupiedArr[newOccupiedArr.length-1]+1 : tgtIdx+newDur;

    // Only push groups that overlap the NEW positions (not freed src positions)
    // Cascade stops at first gap
    const allToShiftRows=[];
    let pushEnd=clearPos;
    for(const grp of sortedGroups){
      if(grp.maxIdx<(newOccupiedArr[0]??tgtIdx)) continue; // entirely before new zone
      if(grp.minIdx>=pushEnd) break;  // gap — stop
      // Check real overlap with newOccupied
      const realOverlap=grp.rows.some(r=>{
        const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
        return newOccupied.has(ri);
      });
      if(!realOverlap) break;
      grp.rows.forEach(r=>allToShiftRows.push(r));
      pushEnd=Math.max(pushEnd, grp.maxIdx+1);
    }

    // For each conflicting OF group, move ALL its rows together (keeping group intact)
    const groupMap={};
    allToShiftRows.forEach(r=>{
      const k=r.of_number+'§'+r.client+'§'+r.designation;
      if(!groupMap[k]) groupMap[k]={rows:[],minIdx:Infinity};
      const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
      groupMap[k].rows.push({r,ri});
      if(ri<groupMap[k].minIdx) groupMap[k].minIdx=ri;
    });
    const shiftMoves=[];
    // Trier les groupes par position et décaler séquentiellement
    const sortedGrps=Object.values(groupMap).sort((a,b)=>a.minIdx-b.minIdx);
    let nextFree=clearPos;
    for(const grp of sortedGrps){
      const grpSize=grp.rows.reduce((mx,{ri})=>Math.max(mx,ri),0) - grp.minIdx + 1;
      const offset=nextFree-grp.minIdx;
      for(const {r,ri} of grp.rows){
        const ni=ri+offset;
        if(ni>=0&&ni<subCols.length) shiftMoves.push({r, nc:subCols[ni]});
      }
      nextFree=nextFree+grpSize;
    }

    // === ATOMIC EXECUTE ===
    const actualDeleted=[];
    const actualInserted=[];
    try{
      // Collecter tous les IDs à supprimer
      const dragSrcRows=dragMoves.filter(m=>!m.isNew).map(m=>m.r);
      const allSrcToDelete=ofR.filter(r=>!dragMoves.find(m=>!m.isNew&&m.r.id===r.id));
      const allToDelete=[...dragSrcRows,...shiftMoves.map(m=>m.r),...allSrcToDelete];
      actualDeleted.push(...allToDelete);

      // BULK DELETE
      if(allToDelete.length>0){
        const ids=[...new Set(allToDelete.map(r=>r.id))].join(',');
        await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
      }

      // BULK INSERT shifts
      if(shiftMoves.length>0){
        const shiftPayload=shiftMoves.map(({r,nc})=>{const {id,...rest}=r;return {...rest,date:nc.date,half_day:nc.hd};});
        const res=await sb('planning',{method:'POST',body:JSON.stringify(shiftPayload),prefer:'return=representation'});
        if(res) actualInserted.push(...res);
      }

      // BULK INSERT dragged OF
      const lastSrc=ofR[ofR.length-1];
      const dragPayload=dragMoves.map(({r,nc,isNew})=>{
        const base=isNew?lastSrc:r;
        const {id,...rest}=base;
        return {...rest,machine:tMachine,date:nc.date,half_day:nc.hd,slot:tSlot};
      });
      if(dragPayload.length>0){
        const res=await sb('planning',{method:'POST',body:JSON.stringify(dragPayload),prefer:'return=representation'});
        if(res) actualInserted.push(...res);
      }

      pushHistory('Déplacement '+src.client, {deleted:actualDeleted, inserted:actualInserted});
      const nPushed=new Set(allToShiftRows.map(r=>r.of_number+'§'+r.client+'§'+r.designation)).size;
      if(nPushed>0) showToast('✓ OF déplacé · '+nPushed+' repoussé(s) · Ctrl+Z');
      else showToast('✓ OF déplacé · Ctrl+Z pour annuler');
    }catch(err){
      console.error('onDrop error:', err);
      showToast('Erreur: '+err.message.slice(0,120));
      // Rollback bulk
      try{
        if(actualInserted.length>0){
          const ids=actualInserted.map(r=>r.id).join(',');
          await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
        }
        if(actualDeleted.length>0){
          const payload=actualDeleted.map(({id,...rest})=>rest);
          await sb('planning',{method:'POST',body:JSON.stringify(payload),prefer:'return=minimal'});
        }
        showToast('État restauré');
      }catch(e2){showToast('Restauration partielle — Ctrl+Z');}
    }finally{busyRef.current=false;loadPlanning();}  }

  async function onSave(formData, halfDayCount, origData){

          .filter(([d,ms])=>ms.includes(formData.machine))
          .map(([d])=>d));
        const slots=planHalfDays(halfDayCount, formData.date, startHD, sets, formData.machine, sat, null, openSatsForMachine);
        // Bulk INSERT
        const payload=slots.map(s=>({...formData,date:s.date,half_day:s.half_day}));

        pushHistory('Ajout '+formData.client, {deleted:[], inserted:inserted||[]});
        // Auto-register new client
        if(formData.client) await sb('clients',{method:'POST',body:JSON.stringify({nom:formData.client}),prefer:'return=minimal'}).catch(()=>{});
        showToast('✓ OF ajouté — '+slots.length+' demi-journée(s) · Ctrl+Z pour annuler');
      } else {
        // Bulk PATCH via id=in.(...)
        const patch={
          of_number: formData.of_number,
          client: formData.client,
          designation: formData.designation,
          mac: formData.mac,
          qte: formData.qte,
          depart: formData.depart,
          conducteur: formData.conducteur,
          bold: formData.bold,
          format: formData.format||'',
        };

          r.machine===orig.machine && r.slot===orig.slot &&
          r.of_number===orig.of_number && r.client===orig.client && r.designation===orig.designation
        );
        if(allOfRows.length>0){

          await sb('planning?id=in.('+ids+')',{method:'PATCH',body:JSON.stringify(patch),prefer:'return=minimal'});
        }
        // Undo: utilise les rows en mémoire (avant patch) comme "deleted", et les rows patchés comme "inserted"
        const patchedRows=allOfRows.map(r=>({...r,...patch}));

        showToast('✓ Mis à jour ('+allOfRows.length+' demi-j) · Ctrl+Z pour annuler');
      }
      setModal(null);loadPlanning();
    }catch(e){showToast('Erreur: '+e.message);}
  }

  async function onShift(machine,of_number,client,designation,slot,halfDays){
    const ofR=rows.filter(r=>r.machine===machine&&r.slot===slot&&r.of_number===of_number&&r.client===client&&r.designation===designation)
      .sort((a,b)=>pd(a.date)-pd(b.date)||(a.half_day||1)-(b.half_day||1));
    const moves=[];
    for(const r of ofR){
      const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
      const ni=ri+halfDays;
      if(ri!==undefined&&ni>=0&&ni<subCols.length) moves.push({r, nc:subCols[ni]});
    }
    if(moves.length===0) return;
    try{
      busyRef.current=true;
      const ids=moves.map(m=>m.r.id).join(',');
      await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
      const payload=moves.map(({r,nc})=>{const {id,...rest}=r;return {...rest,date:nc.date,half_day:nc.hd};});
      const res=await sb('planning',{method:'POST',body:JSON.stringify(payload),prefer:'return=representation'});
      pushHistory('Décalage '+client, {deleted:ofR, inserted:res||[]});
      showToast('✓ Décalé '+(halfDays>0?'+':'')+halfDays+' demi-j · Ctrl+Z pour annuler');
      setModal(null);
    }catch(e){showToast('Erreur: '+e.message);}
    finally{busyRef.current=false;loadPlanning();}
  }

  // ── DRAG-RESIZE handlers ──────────────────────────────────────
  const resizeRef=useRef(null); // tracks live resize state without stale closure

  // Compute drop target (date, hd) from mouse X position on the grid
  function dropTargetFromX(clientX){
    if(!gridRef.current) return null;
    const rect=gridRef.current.getBoundingClientRect();
    const scrollX=gridRef.current.scrollLeft;
    const x=clientX - rect.left + scrollX - LW;
    if(x<0) return null;
    const idx=Math.floor(x/hdw);
    if(idx>=0 && idx<filteredSubCols.length) return filteredSubCols[idx];
    return null;
  }

  function onResizeStart(e, band, slot, machine){
    e.stopPropagation(); e.preventDefault();
    const lastRow=band.rows[band.rows.length-1];
    const state={band, slot, machine, startX:e.clientX, origDur:band.rows.length, curDur:band.rows.length};
    resizeRef.current=state;
    setResizeSrc({...state});

    function onMove(ev){
      const dx=ev.clientX-state.startX;
      const deltaCols=Math.round(dx/hdw);
      const newDur=Math.max(1, state.origDur+deltaCols);
      resizeRef.current={...resizeRef.current, curDur:newDur};
      setResizeSrc(r=>r?{...r,curDur:newDur}:null);
    }
    async function onUp(){
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      const rs=resizeRef.current;
      resizeRef.current=null;
      setResizeSrc(null);
      justResizedRef.current=true;
      setTimeout(()=>{justResizedRef.current=false;},300);
      if(rs && rs.curDur!==rs.origDur){
        busyRef.current=true;
        try{
          await onResize(rs.machine, rs.band.of_number, rs.band.client, rs.band.designation, rs.slot, rs.curDur);
        }finally{busyRef.current=false;}
      }
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  }

  // Resize OF: change duration, pushing ALL subsequent OFs if growing
  async function onResize(machine,of_number,client,designation,slot,newHalfDays){
    const ofR=rows.filter(r=>r.machine===machine&&r.slot===slot&&r.of_number===of_number&&r.client===client&&r.designation===designation)
      .sort((a,b)=>pd(a.date)-pd(b.date)||(a.half_day||1)-(b.half_day||1));
    const curLen=ofR.length;
    if(newHalfDays===curLen){setModal(null);return;}
    const last=ofR[ofR.length-1];
    const lastIdx=subColsMap.get(last.date+'|'+(last.half_day||1));
    const extra=newHalfDays-curLen; // positive = grow, negative = shrink

    try{
      if(extra<0){
        // Shrink: remove trailing slots
        const toRemove=ofR.slice(newHalfDays);
        const ids=toRemove.map(r=>r.id).join(',');
        await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
        pushHistory('Réduit '+of_number, {deleted:toRemove, inserted:[]});
        showToast('✓ Réduit à '+newHalfDays/2+' éq · Ctrl+Z pour annuler');
        setModal(null);loadPlanning();
        return;
      }

      // Build new slots to add for growing OF — en utilisant les subCols de la machine (jours fermés exclus)
      const msc=getMachineSubCols(machine);
      const lastIdxMsc=msc.findIndex(c=>c.date===last.date&&c.hd===(last.half_day||1));
      const addSlots=[];
      for(let i=1;i<=extra;i++){
        const ni=lastIdxMsc+i;
        if(ni<msc.length) addSlots.push(msc[ni]);
      }

      // Only push OFs that actually overlap the new slots (respect free gaps)
      const newIdxSet=new Set(addSlots.map((_,i)=>lastIdx+1+i));
      // Build OF groups on same machine+slot
      const ofMapR={};
      rows.forEach(r=>{
        if(r.machine!==machine||r.slot!==slot) return;
        if(r.of_number===of_number&&r.client===client&&r.designation===designation) return;
        const k=r.of_number+'§'+r.client+'§'+r.designation;
        if(!ofMapR[k]) ofMapR[k]={rows:[],minIdx:Infinity,maxIdx:-1};
        const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
        ofMapR[k].rows.push(r); ofMapR[k].minIdx=Math.min(ofMapR[k].minIdx,ri); ofMapR[k].maxIdx=Math.max(ofMapR[k].maxIdx,ri);
      });
      const sortedGroupsR=Object.values(ofMapR).sort((a,b)=>a.minIdx-b.minIdx);

      // Cascade push via msc (machine subCols)
      const mscMap=new Map(); msc.forEach((c,i)=>mscMap.set(c.date+'|'+c.hd,i));
      const toShiftRows=[];
      let pushEndR=lastIdxMsc+extra+1;
      for(const grp of sortedGroupsR){
        const grpMinMsc=Math.min(...grp.rows.map(r=>mscMap.get(r.date+'|'+(r.half_day||1))??Infinity));
        const grpMaxMsc=Math.max(...grp.rows.map(r=>mscMap.get(r.date+'|'+(r.half_day||1))??-1));
        if(grpMinMsc>=pushEndR) break;
        if(grpMaxMsc<=lastIdxMsc) continue;
        grp.rows.forEach(r=>toShiftRows.push(r));
        pushEndR=Math.max(pushEndR, grpMaxMsc+extra+1);
      }

      const shiftMoves=toShiftRows.map(r=>{
        const ri=mscMap.get(r.date+'|'+(r.half_day||1));
        if(ri===undefined||ri<=lastIdxMsc) return null;
        const ni=ri+extra;
        return {r, nc: ni<msc.length ? msc[ni] : null};
      }).filter(m=>m&&m.nc!==null);
      const toShift=toShiftRows;

      // ATOMIC: delete all shifted rows, reinsert at new positions, then add new OF slots
      const actualInserted=[];
      if(toShiftRows.length>0){
        const ids=toShiftRows.map(r=>r.id).join(',');
        await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
      }
      for(const {r,nc} of shiftMoves){
        const {id,...rest}=r;
        const res=await sb('planning',{method:'POST',body:JSON.stringify({...rest,date:nc.date,half_day:nc.hd}),prefer:'return=representation'});
        if(res&&res[0]) actualInserted.push(res[0]);
      }
      for(const nc of addSlots){
        const res=await sb('planning',{method:'POST',
          body:JSON.stringify({machine,date:nc.date,half_day:nc.hd,slot,
            of_number,client,designation,mac:last.mac,qte:last.qte,
            depart:last.depart,conducteur:last.conducteur,bold:last.bold}),
          prefer:'return=representation'});
        if(res&&res[0]) actualInserted.push(res[0]);
      }

      const nPushed=new Set(toShiftRows.map(r=>r.of_number+'§'+r.client+'§'+r.designation)).size;
      pushHistory('Redimensionnement '+of_number, {deleted:toShiftRows, inserted:actualInserted});
      showToast('✓ Étendu à '+newHalfDays/2+' éq'+(nPushed?' · '+nPushed+' OF repoussé(s)':'') +' · Ctrl+Z pour annuler');
      setModal(null);loadPlanning();
    }catch(e){showToast('Erreur resize: '+e.message);}
  }

  // Saturday config
  async function saveSatConfig(date, machines){
    const prevMachines=satConfigs[date]||[];
    const newlyAdded=machines.filter(m=>!prevMachines.includes(m));
    const newlyRemoved=prevMachines.filter(m=>!machines.includes(m));

    setSatModal(null);

    try{
      await sb('saturday_config?date=eq.'+encodeURIComponent(date),{method:'DELETE',prefer:'return=minimal'}).catch(()=>{});
      if(machines.length>0)
        await sb('saturday_config',{method:'POST',body:JSON.stringify({date,machines}),prefer:'return=minimal'});

      busyRef.current=true;
      const satD=pd(date);
      const monD=new Date(satD);monD.setDate(satD.getDate()+2);
      const monDate=fd(monD);

      // Build extended subCols including Saturday slots
      // This is the full sequence: ...FriM, FriPM, SatM, SatPM, MonM, MonPM...
      function buildExtSubCols(withSat){
        // withSat: boolean - include Saturday date?
        const allDates=new Set(dates);
        if(withSat) allDates.add(date);
        else allDates.delete(date); // dates contient déjà le Sam s'il était ouvert — le supprimer explicitement
        const sorted=[...allDates].sort((a,b)=>pd(a)-pd(b));
        const cols=[];
        sorted.forEach(d=>{ cols.push({date:d,hd:1}); cols.push({date:d,hd:2}); });
        return cols;
      }

      // OPEN: slots shift from "subCols without Sat" positions to "subCols with Sat" positions
      // Each slot at monDate+ moves back by 2 (Saturday takes slots 0,1; Monday shifts to 2,3...)
      // = each row's index in the WITH-SAT sequence = its index in WITHOUT-SAT sequence + 2
      // So: new position = current position - 2 in the WITH-SAT sequence
      // Equivalently: row at monDate/hd:1 → satDate/hd:1, monDate/hd:2 → satDate/hd:2,
      //               nextDate/hd:1 → monDate/hd:1, etc.
      // Simple: each row shifts by -2 in the extended subcols

      for(const machine of newlyAdded){
        const extCols=buildExtSubCols(true);
        const toShift=rows.filter(r=>{
          if(r.machine!==machine) return false;
          const ri=extCols.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
          const monI=extCols.findIndex(c=>c.date===monDate&&c.hd===1);
          return ri>=monI;
        }).sort((a,b)=>pd(a.date)-pd(b.date)||(a.half_day||1)-(b.half_day||1));

        if(toShift.length===0) continue;

        // Delete all first
        for(const r of toShift)
          await sb('planning?id=eq.'+r.id,{method:'DELETE',prefer:'return=minimal'});

        // Reinsert each shifted by -2 in extCols
        for(const r of toShift){
          const ri=extCols.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
          const ni=ri-2;
          if(ni>=0){
            const nc=extCols[ni];
            const {id,...rest}=r;
            await sb('planning',{method:'POST',body:JSON.stringify({...rest,date:nc.date,half_day:nc.hd}),prefer:'return=minimal'});
          }
        }
      }

      // CLOSE: each slot shifts by +2
      // Row at satDate/hd:1 → monDate/hd:1, satDate/hd:2 → monDate/hd:2,
      // monDate/hd:1 → nextDate/hd:1, etc.
      for(const machine of newlyRemoved){
        const extCols=buildExtSubCols(true); // still has Saturday in it
        const satI=extCols.findIndex(c=>c.date===date&&c.hd===1);
        const toShift=rows.filter(r=>{
          if(r.machine!==machine) return false;
          const ri=extCols.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
          return ri>=satI;
        }).sort((a,b)=>pd(b.date)-pd(a.date)||(b.half_day||1)-(a.half_day||1)); // reverse order

        if(toShift.length===0) continue;

        // Delete all first (reverse order to avoid conflicts)
        for(const r of toShift)
          await sb('planning?id=eq.'+r.id,{method:'DELETE',prefer:'return=minimal'});

        // Reinsert at same index in extColsNoSat (Saturday removed → Mon shifts to satI)
        // SatM(satI in extCols) → extColsNoSat[satI] = MonM ✓
        // MonM(satI+2 in extCols) → extColsNoSat[satI+2] = TueM ✓ (gap preserved)
        const extColsNoSat=buildExtSubCols(false);
        for(const r of [...toShift].reverse()){
          const ri=extCols.findIndex(c=>c.date===r.date&&c.hd===(r.half_day||1));
          const ni=ri; // same index, Saturday slots just disappear
          if(ni>=0&&ni<extColsNoSat.length){
            const nc=extColsNoSat[ni];
            const {id,...rest}=r;
            await sb('planning',{method:'POST',body:JSON.stringify({...rest,date:nc.date,half_day:nc.hd}),prefer:'return=minimal'});
          }
        }
      }

    }catch(e){showToast('Erreur samedi: '+e.message);}
    finally{
      busyRef.current=false;
      setSatConfigs(s=>({...s,[date]:machines}));
      load();
    }
  }
  // Helper: get next saturday after a friday date
  function nextSaturday(fridayStr){
    var d=pd(fridayStr);d.setDate(d.getDate()+1);return fd(d);
  }

  // Toggle regime for machine+date
  async function toggleRegime(machine, date){
    const cur=getRegime(regimes,machine,date);
    const next=cur==='1x8'?'2x8':'1x8';

    // Optimistic UI update immédiat
    setRegimes(r=>({...r,[machine+'|'+date]:next}));

    // Upsert régime en DB
    try{
      await sb('machine_regime?machine=eq.'+encodeURIComponent(machine)+'&date=eq.'+encodeURIComponent(date),
        {method:'DELETE',prefer:'return=minimal'});
    }catch(e){}
    await sb('machine_regime',{method:'POST',body:JSON.stringify({machine,date,mode:next}),prefer:'return=minimal'});

    const dayRows=rows.filter(r=>r.machine===machine&&r.date===date);
    if(dayRows.length===0){ loadPlanning(); return; }

    busyRef.current=true;
    try{
      const ofKeys=[...new Set(dayRows.map(r=>r.of_number+'§'+r.client+'§'+r.designation+'§'+r.slot))];
      const newRegimes={...regimes,[machine+'|'+date]:next};
      const allToDelete=[];
      const allToInsert=[];

      for(const k of ofKeys){
        const [ofn,cli,des,sl]=k.split('§');
        const slot=parseInt(sl);
        const ofR=rows.filter(r=>r.machine===machine&&r.slot===slot&&r.of_number===ofn&&r.client===cli&&r.designation===des)
          .sort((a,b)=>pd(a.date)-pd(b.date)||(a.half_day||1)-(b.half_day||1));
        const oldDur=ofR.length;
        const totalEq=ofR.reduce((sum,r)=>{
          const m=getRegime(regimes,machine,r.date);
          return sum+(m==='2x8'?1:0.5);
        },0);
        const startIdx=subColsMap.get(ofR[0].date+'|'+(ofR[0].half_day||1));
        let eq=0,newDur=0;
        for(let i=startIdx;i<subCols.length&&eq<totalEq;i++){
          eq+=((newRegimes[machine+'|'+subCols[i].date])||'1x8')==='2x8'?1:0.5;
          newDur++;
        }
        if(newDur===oldDur) continue;

        if(next==='2x8'){
          const freed=oldDur-newDur;
          const oldLastIdx=subColsMap.get(ofR[ofR.length-1].date+'|'+(ofR[ofR.length-1].half_day||1));
          const slotAfterOld=oldLastIdx+1;
          ofR.slice(newDur).forEach(r=>allToDelete.push(r));
          const adjacentRows=rows.filter(r=>{
            if(r.machine!==machine||r.slot!==slot) return false;
            if(r.of_number===ofn&&r.client===cli&&r.designation===des) return false;
            const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
            return ri>=slotAfterOld;
          });
          const isAdjacent=adjacentRows.some(r=>{
            const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
            return ri===slotAfterOld;
          });
          if(isAdjacent&&freed>0){
            const ofMapPull={};
            adjacentRows.forEach(r=>{
              const rk=r.of_number+'§'+r.client+'§'+r.designation;
              if(!ofMapPull[rk]) ofMapPull[rk]={rows:[],minIdx:Infinity};
              const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
              ofMapPull[rk].rows.push({r,ri});
              if(ri<ofMapPull[rk].minIdx) ofMapPull[rk].minIdx=ri;
            });
            const sorted=Object.values(ofMapPull).sort((a,b)=>a.minIdx-b.minIdx);
            let pullEnd=slotAfterOld;
            const toPull=[];
            for(const grp of sorted){
              if(grp.minIdx>pullEnd) break;
              toPull.push(...grp.rows);
              pullEnd=Math.max(pullEnd,...grp.rows.map(x=>x.ri+1));
            }
            toPull.forEach(({r})=>allToDelete.push(r));
            toPull.forEach(({r,ri})=>{
              const ni=ri-freed;
              if(ni>=0&&ni<subCols.length){
                const nc=subCols[ni];
                const {id,...rest}=r;
                allToInsert.push({...rest,date:nc.date,half_day:nc.hd});
              }
            });
          }
        } else {
          // Grow
          const last=ofR[ofR.length-1];
          const lastIdx=subColsMap.get(last.date+'|'+(last.half_day||1));
          const extra=newDur-oldDur;
          const addSlots=[];
          for(let i=1;i<=extra;i++){const ni=lastIdx+i;if(ni<subCols.length)addSlots.push(subCols[ni]);}
          const ofMapR={};
          rows.forEach(r=>{
            if(r.machine!==machine||r.slot!==slot) return;
            if(r.of_number===ofn&&r.client===cli&&r.designation===des) return;
            const k2=r.of_number+'§'+r.client+'§'+r.designation;
            if(!ofMapR[k2]) ofMapR[k2]={rows:[],minIdx:Infinity,maxIdx:-1};
            const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
            ofMapR[k2].rows.push(r);ofMapR[k2].minIdx=Math.min(ofMapR[k2].minIdx,ri);ofMapR[k2].maxIdx=Math.max(ofMapR[k2].maxIdx,ri);
          });
          const sortedG=Object.values(ofMapR).sort((a,b)=>a.minIdx-b.minIdx);
          const toShiftRows=[];
          let pushEndR=lastIdx+extra+1;
          for(const grp of sortedG){
            if(grp.minIdx>=pushEndR) break;
            if(grp.maxIdx<=lastIdx) continue;
            grp.rows.forEach(r=>toShiftRows.push(r));
            pushEndR=Math.max(pushEndR,grp.maxIdx+extra+1);
          }
          toShiftRows.forEach(r=>allToDelete.push(r));
          toShiftRows.forEach(r=>{
            const ri=subColsMap.get(r.date+'|'+(r.half_day||1));
            if(ri<=lastIdx) return;
            const ni=ri+extra;
            if(ni<subCols.length){const nc=subCols[ni];const {id,...rest}=r;allToInsert.push({...rest,date:nc.date,half_day:nc.hd});}
          });
          addSlots.forEach(nc=>{const {id,...rest}=last;allToInsert.push({...rest,date:nc.date,half_day:nc.hd});});
        }
      }

      // BULK DELETE
      if(allToDelete.length>0){
        const ids=[...new Set(allToDelete.map(r=>r.id))].join(',');
        await sb('planning?id=in.('+ids+')',{method:'DELETE',prefer:'return=minimal'});
      }
      // BULK INSERT
      if(allToInsert.length>0){
        await sb('planning',{method:'POST',body:JSON.stringify(allToInsert),prefer:'return=minimal'});
      }

    }finally{busyRef.current=false;}
    loadPlanning();
  }
