          <span style={{fontSize:10,color:'#bbb'}}>Glisser = déplacer · Cliquer = éditer</span>
        </div>
      </div>

      {/* GRID */}
      <div ref={gridRef} style={{flex:1,overflow:'auto',background:'#f0f0ec',cursor:resizeSrc?'ew-resize':'default'}}>
        <div style={{display:'grid',gridTemplateColumns:gTC,gridTemplateRows:gTR,minWidth:LW+nSC*hdw,position:'relative'}}>

          {/* LIGNE AUJOURD'HUI — traverse toutes les lignes */}
          {(()=>{
            const todayIdx=filteredDates.indexOf(today);
            if(todayIdx<0) return null;
            const left=LW+todayIdx*2*hdw;
            const totalRows=2+MACHINES.length*2;
            return(
              <div style={{
                position:'absolute',top:0,bottom:0,
                left:left,width:hdw*2,
                background:'rgba(255,215,0,0.06)',
                pointerEvents:'none',zIndex:0,
              }}/>
            );
          })()}

          {/* CORNER */}
          <div style={{gridRow:'1/3',gridColumn:1,position:'sticky',top:0,left:0,zIndex:30,
            background:'#000',borderRight:'2px solid #c9a84c',borderBottom:'3px solid #c9a84c',
            padding:'8px 10px',display:'flex',alignItems:'flex-end',
            fontFamily:'IBM Plex Mono,monospace',fontSize:10,fontWeight:600,color:'#c9a84c',letterSpacing:1}}>
            MACHINE
          </div>

          {/* WEEK BANDEAUX — row 1 */}
          {(()=>{
            const weeks=[];let cur=null;
            filteredDates.forEach((date,di)=>{
              const d=pd(date),wk=getISOWeek(d),yr=d.getFullYear(),key=yr+'W'+wk;
              if(!cur||cur.key!==key){if(cur)weeks.push(cur);cur={key,wk,si:di,ei:di,par:wk%2};}
              else cur.ei=di;
            });
            if(cur)weeks.push(cur);
            return weeks.map(w=>{
              const cs=2+w.si*2,ce=2+w.ei*2+2;
              const bg=w.par===0?'#a8c8e8':'#a8dab8';
              return(
                <div key={w.key} style={{
                  gridRow:1,gridColumn:cs+'/'+ce,
                  position:'sticky',top:0,zIndex:11,
                  background:bg,
                  borderBottom:'1px solid #2a2a2a',
                  borderRight:'1px solid #2a2a2a',
                  display:'flex',alignItems:'center',justifyContent:'center',
                }}>
                  <span style={{fontSize:9,fontWeight:700,fontFamily:'IBM Plex Mono,monospace',color:'#2a2a1a',letterSpacing:1}}>
                    S{w.wk}
                  </span>
                </div>
              );
            });
          })()}

          {/* DATE HEADERS — row 2, each spans 2 sub-cols */}
          {filteredDates.map((date,di)=>{
            const d=pd(date),dow=d.getDay(),isT=date===today;
            const isSat=dow===6;
            const wk=getISOWeek(d),par=wk%2;
            // Alternate week colors (preserving today/sat highlights)
            const wkBg=par===0?'#c8dff5':'#c8efd4';
            const bg=isT?'#2a1e00':isSat?'#081828':wkBg;
            const nc=isT?'#ffd050':isSat?'#7be':'#1a1916';
            const sc=isT?'#b89030':isSat?'#5aa':'#4a4a40';
            const colStart=2+di*2;
            const prevDate=filteredDates[di-1];
            const prevDow=prevDate?pd(prevDate).getDay():-1;
            const prevSatDate=prevDate?(()=>{var d2=pd(prevDate);d2.setDate(d2.getDate()+1);return fd(d2);})():null;
            const satMachines=satConfigs[date]||[];
            return(<React.Fragment key={date}>
              {(()=>{
                const showBetween=prevDow===5&&dow!==6&&prevSatDate;
                const showOnSat=isSat&&satMachines.length>0;
                if(!showBetween&&!showOnSat) return null;
                const btnDate=showOnSat?date:prevSatDate;
                const satOpen=(satConfigs[btnDate]||[]).length>0;
                return(
                  <div style={{
                    gridRow:2,
                    gridColumn:showOnSat?(colStart+1)+'/'+(colStart+2):(colStart-1)+'/'+colStart,
                    position:'sticky',top:WKH,zIndex:20,
                    display:'flex',alignItems:'center',
                    justifyContent:showOnSat?'flex-end':'flex-end',
                    pointerEvents:'none',
                  }}>
                    <div onClick={()=>setSatModal({date:btnDate,machines:satConfigs[btnDate]||[]})}
                      title={satOpen?'Modifier/fermer ce samedi':'Ouvrir ce samedi'}
                      style={{
                        width:16,height:16,borderRadius:'50%',cursor:'pointer',
                        background:satOpen?'#c0392b':'#8a6a20',
                        color:'#fff',fontSize:13,fontWeight:900,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        lineHeight:1,userSelect:'none',pointerEvents:'all',
                        boxShadow:'0 1px 4px rgba(0,0,0,.6)',
                        transform:showOnSat?'translateX(-4px)':'translateX(8px)',
                        border:'1.5px solid rgba(255,255,255,.3)',
                      }}>{satOpen?'−':'+'}</div>
                  </div>
                );
              })()}
              <div style={{
                gridRow:2,gridColumn:colStart+'/'+(colStart+2),
                position:'sticky',top:WKH,zIndex:10,
                background:bg,
                borderBottom:'3px solid #c9a84c',
                borderRight:'2px solid #3a3a3a',
                textAlign:'center',padding:'4px 2px 3px',userSelect:'none'
              }}>
                <div style={{fontSize:11,color:sc,fontFamily:'IBM Plex Mono,monospace',fontWeight:600,letterSpacing:.3}}>{DAY[dow]}</div>
                <div style={{fontSize:20,fontWeight:700,color:nc,lineHeight:1.05}}>{d.getDate()}</div>
                <div style={{fontSize:10,color:sc,fontWeight:600}}>{MON[d.getMonth()]}</div>
              </div>
              {isSat&&(satConfigs[date]||[]).length>0&&(
                <div style={{gridRow:2,gridColumn:(di*2+2)+'/'+(di*2+4),
                  display:'flex',alignItems:'flex-end',justifyContent:'flex-end',
                  pointerEvents:'none',position:'relative'}}>
                  <button onClick={()=>setSatModal({date,machines:satConfigs[date]||[]})}
                    style={{pointerEvents:'all',position:'absolute',top:4,right:4,
                      padding:'1px 6px',fontSize:9,borderRadius:3,border:'1px solid #aaa',
                      background:'rgba(255,255,255,.8)',cursor:'pointer',color:'#555'}}>✏</button>
                </div>
              )}
            </React.Fragment>);
          })}

          {/* Sub-header row (M/AM labels) — sticky just below date header */}
          {/* We embed M/AM in the half-day cells as tiny labels instead */}

          {/* MACHINE ROWS */}
          {MACHINES.map((machine,mi)=>{
            const rReg=3+mi*2, r1=4+mi*2;
            const dMode=getModeForDate(sets,machine,today);
            const b1=bandsPerMachine[machine]||[];
            const mc=MACHINE_COLORS[machine]||{bg:'#fff',text:'#1a1916'};

            const used1=new Set(b1.flatMap(b=>b.special?[b.i]:Array.from({length:b.ei-b.si+1},(_,k)=>b.si+k)));

            return(
              <React.Fragment key={machine}>
                {/* LABEL spans both rows */}
                <div style={{
                  gridRow:rReg+'/'+(r1+1),gridColumn:1,
                  position:'sticky',left:0,zIndex:5,
                  background:mc.bg,borderRight:'2px solid #b8b5aa',borderBottom:'2px solid #ccc',
                  padding:'0 10px',display:'flex',flexDirection:'column',justifyContent:'center',
                  height:RGH+RH
                }}>
                  <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:13,fontWeight:700,color:mc.text}}>{machine}</div>
                </div>

                {/* REGIME ROW — one cell per day */}
                {filteredDates.map((date,di)=>{
                  const mode=getRegime(regimes,machine,date);
                  const is2x8=mode==='2x8';
                  const isSatOpen=isSaturdayDate(date)&&(satConfigs[date]||[]).includes(machine);
                  const isSat=isSaturdayDate(date);
                  const colStart=2+di*2;
                  return(
                    <div key={'reg'+date}
                      style={{
                        gridRow:rReg, gridColumn:colStart+'/'+(colStart+2),
                        background:isSatOpen?'#fff3c0':is2x8?'#d4eaff':'transparent',
                        borderBottom:isSatOpen?'1px solid #e0c040':is2x8?'1px solid #90c4f0':'1px solid #e8e8e0',
                        borderRight:'1px solid #e0e0d8',
                        display:'flex',alignItems:'center',justifyContent:'center',
                        cursor:isSat?'default':'pointer',userSelect:'none',
                        transition:'background .15s',
                      }}
                      onClick={isSat?undefined:()=>toggleRegime(machine,date)}
                      title={isSat?'Samedi — 1 équipe':is2x8?'2×8 — cliquer pour passer en 1×8':'1×8 — cliquer pour passer en 2×8'}
                    >
                      <span style={{
                        fontSize:9,fontWeight:700,
                        fontFamily:'IBM Plex Mono,monospace',
                        letterSpacing:.5,
                        color:isSatOpen?'#7a6000':is2x8?'#104070':'#d8d8d0',
                        fontWeight:isSatOpen?700:400,
                      }}>{isSatOpen?'Sam':is2x8?'2×8':'1×8'}</span>
                    </div>
                  );
                })}

                {/* Slot 1 bands */}
                {b1.map((band,bi)=>{
                  if(band.special){
                    return <div key={'sp1'+bi} style={{gridRow:r1,gridColumn:band.i+2,background:'#f0ecec',borderBottom:'1px solid rgba(0,0,0,.04)',borderRight:'1px solid #e8e5e2',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}
                      onClick={()=>setModal({type:'edit',data:{...band.row}})}
                    >
                      <span style={{fontSize:7,color:'#ccc',fontFamily:'IBM Plex Mono,monospace'}}>{band.type.slice(0,3)}</span>
                    </div>;
                  }
                  const isDrg=dragSrc&&band.of_number===dragSrc.of_number&&band.client===dragSrc.client&&band.designation===dragSrc.designation;
                  const isDone=getDone(band.fr);
                  const color=isDone?'#b0b0b0':ofColorKey(band.fr);
                  const span=band.ei-band.si+1;
                  const k=machine+'|'+band.rows[0].date+'|'+(band.rows[0].half_day||1)+'|1';
                  return(
                    <div key={'b1'+bi} style={{
                      gridRow:r1,gridColumn:(band.si+2)+'/'+(band.ei+3),
                      background:color,opacity:isDrg?.4:1,
                      borderBottom:'1px solid rgba(0,0,0,.07)',
                      borderRight:span>1?'1px solid rgba(0,0,0,.08)':'1px solid rgba(0,0,0,.08)',
                      borderRadius:'4px 4px 0 0',
                      padding:'2px 5px 1px 8px',position:'relative',overflow:'hidden',
                      cursor:'grab',
                      boxShadow:(!isDone&&band.bold)?'inset 4px 0 0 #2d6a4f':'inset 4px 0 0 rgba(0,0,0,.15)',
                      zIndex:1,
                    }}
                      draggable={!resizeSrc} onDragStart={e=>onDS(e,band.fr)}
                      onDragOver={e=>onDO(e,k)} onDragLeave={onDL}
                      onDrop={e=>{const t=dropTargetFromX(e.clientX);if(t)onDrop(e,machine,t.date,t.hd,1);}}
                      onClick={()=>{if(justResizedRef.current)return;setModal({type:'edit',data:{...band.fr}})}}
                      title={[
                        'OF : '+(band.of_number||'—'),
                        band.designation||'',
                        band.fr.mac?'MAC : '+band.fr.mac:'',
                        [band.fr.format, band.depart?(()=>{const p=band.depart.split('/');return p.length>=2?p[0]+'/'+p[1]:band.depart;})():null].filter(Boolean).join(' - '),
                        getObs(band.fr)?'Obs : '+getObs(band.fr):'',
                      ].filter(Boolean).join('\n')}
                    >
                      {(()=>{const lastRow=band.rows[band.rows.length-1];const dc=isDone?null:getDeadlineColor(band.depart,lastRow.date,sat);return dc&&<div style={{position:'absolute',top:0,right:0,width:dc==='#e8001a'?8:4,height:'100%',background:dc,borderRadius:'0 4px 4px 0'}}/>})()}
                      {(()=>{const tc=contrastColor(color);return(<>
                        <div style={{fontSize:14,fontWeight:700,color:tc,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:1.25}}>{band.client}</div>
                        {band.designation&&<div style={{fontSize:13,color:tc,opacity:.75,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:1.2}}>{band.designation}</div>}
                        {band.fr.qte&&<div style={{fontSize:12,fontWeight:700,color:tc,opacity:.8,fontFamily:'IBM Plex Sans,sans-serif',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{band.fr.qte}</div>}
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginTop:1,paddingRight:10}}>
                          {band.fr.format?<span style={{fontSize:12,fontWeight:700,color:tc,opacity:.8,fontFamily:'IBM Plex Sans,sans-serif',whiteSpace:'nowrap'}}>{band.fr.format}</span>:<span/>}
                          {band.depart&&<span style={{fontSize:12,fontWeight:700,color:tc,opacity:.8,fontFamily:'IBM Plex Sans,sans-serif',whiteSpace:'nowrap',marginLeft:'auto'}}>
                            {(()=>{const p=band.depart.split('/');return p.length>=2?p[0]+'/'+p[1]:band.depart;})()}
                          </span>}
                        </div>
                      </>);})()}
                      {dragOver===k&&<div style={{position:'absolute',inset:0,border:'2px solid #8a6a20',borderRadius:'inherit',pointerEvents:'none'}}/>}
                      {/* Resize handle — right edge */}
                      <div onMouseDown={e=>onResizeStart(e,band,1,machine)}
                        style={{position:'absolute',top:0,right:0,width:6,height:'100%',cursor:'ew-resize',zIndex:4,
                          background:'rgba(0,0,0,.0)'}}
                        onClick={e=>e.stopPropagation()}/>
                      {/* Resize preview overlay */}
                      {resizeSrc&&resizeSrc.band.of_number===band.of_number&&resizeSrc.band.client===band.client&&resizeSrc.band.designation===band.designation&&resizeSrc.slot===1&&resizeSrc.machine===machine&&(
                        <div style={{position:'absolute',inset:0,pointerEvents:'none',
                          background:'rgba(255,255,255,.35)',
                          outline:'2px dashed #8a6a20',outlineOffset:'-2px',borderRadius:'inherit',
                          display:'flex',alignItems:'center',justifyContent:'center'}}>
                          <span style={{fontSize:13,fontWeight:700,color:'#1a1916',fontFamily:'IBM Plex Mono,monospace',
                            background:'rgba(255,255,255,.85)',padding:'2px 8px',borderRadius:4,boxShadow:'0 1px 4px rgba(0,0,0,.2)'}}>
                            {(()=>{
                              const firstRow=resizeSrc.band.rows[0];
                              const startIdx=subColsMap.get(firstRow.date+'|'+(firstRow.half_day||1));
                              let eq=0;
                              for(let i=0;i<resizeSrc.curDur;i++){
                                const sc=subCols[startIdx+i];
                                if(!sc) break;
                                const m=getRegime(regimes,resizeSrc.machine,sc.date);
                                eq+=(m==='2x8'?1:0.5);
                              }
                              return eq;
                            })()} éq
                          </span>
                        </div>
                      )}
                    </div>
                  );
                })}

                {/* Slot 1 empties */}
                {filteredSubCols.map(({date,hd},sci)=>{
                  if(used1.has(sci))return null;
                  const k=machine+'|'+date+'|'+hd+'|1';
                  const isM=hd===1;
                  const isClosed=closures[machine+'|'+date];
                  if(isClosed){
                    // Afficher seulement le matin (span 2 demi-j) avec hachuré
                    if(!isM) return null;
                    return(
                      <div key={'e1'+sci} style={{
                        gridRow:r1,gridColumn:sci+2+'/'+(sci+4),
                        background:'repeating-linear-gradient(45deg,#e8e5e0,#e8e5e0 4px,#f0eee8 4px,#f0eee8 8px)',
                        borderBottom:'1px solid #d0ccc5',borderRight:'1px solid #d0ccc5',
                        cursor:'pointer',position:'relative',
                        display:'flex',alignItems:'center',justifyContent:'center',
                      }}
                        onClick={()=>openClosure(machine,date)}
                        title={`Machine fermée le ${date} — cliquer pour rouvrir`}
                      >
                        <span style={{fontSize:10,color:'#999',fontFamily:'IBM Plex Mono,monospace',fontWeight:700,background:'rgba(255,255,255,.7)',padding:'1px 5px',borderRadius:3}}>🔒 FERMÉ</span>
                      </div>
                    );
                  }
                  return(
                    <div key={'e1'+sci} style={{
                      gridRow:r1,gridColumn:sci+2,
                      background:dragOver===k?'#edf5e0':date===today?'rgba(255,215,0,0.06)':isM?'#fafaf8':'#f5f5f2',
                      borderBottom:'1px solid rgba(0,0,0,.04)',
                      borderRight:isM?'none':'1px solid #dddbd3',
                      cursor:'pointer',position:'relative'
                    }}
                      onDragOver={e=>onDO(e,k)} onDragLeave={onDL}
                      onDrop={e=>onDrop(e,machine,date,hd,1)}
                      onClick={()=>setModal({type:'add',data:{...base,machine,date,half_day:hd,slot:1}})}
                    />
                  );
                })}

              </React.Fragment>
            );
          })}
        </div>
      </div>

      {modal&&<EditModal modal={modal} onClose={()=>setModal(null)} onSave={onSave} onDel={onDel} onShift={onShift} onResize={onResize} rows={rows} subCols={subCols} dates={dates} sets={sets} sat={sat} clients={clients} onCloseMachine={saveClosure}/>}
      {showSet&&<Settings sets={sets} onChange={upd} onClose={()=>setShowSet(false)}/>}
      {showClients&&<ClientsManager onClose={()=>{setShowClients(false);load();}}/>}
      {satModal&&<SaturdayModal date={satModal.date} machines={satModal.machines}
        onClose={()=>setSatModal(null)} onSave={saveSatConfig}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

function EditModal({modal,onClose,onSave,onDel,onShift,onResize,rows,subCols,dates,sets,sat,clients,onCloseMachine}){
  const isEdit=modal.type==='edit';
  const [f,setF]=useState({...modal.data});
  const [hdCount,setHdCount]=useState(2); // half-days, default 1j

  // Calculs régime et durée AVANT newDur useState
  const regimeKey=(window._regimes&&window._regimes[modal.data.machine+'|'+modal.data.date]);
  const mode0=regimeKey||'1x8';
  const ofRowsInit=isEdit?(rows||[]).filter(r=>r.machine===modal.data.machine&&r.slot===modal.data.slot&&r.of_number===modal.data.of_number&&r.client===modal.data.client&&r.designation===modal.data.designation):[];
  const curEqInit=ofRowsInit.reduce((sum,r)=>{
    const m=(window._regimes&&window._regimes[r.machine+'|'+r.date])||'1x8';
    return sum+(m==='2x8'?1:0.5);
  },0);
  const eqF0=mode0==='2x8'?1:2;
  // newDur initialisé en demi-j correspondant à curEq dans le mode du premier slot
  const [newDur,setNewDur]=useState(()=>{
    if(!isEdit) return 2;
    return Math.max(1, Math.round(curEqInit) * eqF0);
  });
  // Color: auto from designation (fallback client), with manual override
  const autoColor=hc((f.designation||f.client||''));
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const [clientSugg,setClientSugg]=useState([]);
  const [showSugg,setShowSugg]=useState(false);
  function onClientChange(val){
    s('client',val);
    if(val.length>=1){
      const q=val.toLowerCase();
      setClientSugg((clients||[]).filter(c=>c.toLowerCase().includes(q)).slice(0,8));
      setShowSugg(true);
    } else {
      setShowSugg(false);
    }
  }
  // Extract existing color override from conducteur field
  const existingColor=(()=>{
    const c=modal.data.conducteur||'';
    if(c.startsWith('COLOR:')){const m=c.match(/^COLOR:(#[0-9a-fA-F]{6})/);if(m)return m[1];}
    return null;
  })();
  const [colorOverride,setColorOverride]=useState(existingColor);
  const [showPalette,setShowPalette]=useState(false);
  const displayColor=colorOverride||autoColor;
  const mode=mode0;
  const hpd=hphd(mode==='2x8'?'2x8':'journee');
  const ofRows=ofRowsInit;
  const curDuration=ofRows.length;
  const curEq=curEqInit;

  // Convert dd/mm/yy to yyyy-mm-dd for input[type=date] and back
  function toInputDate(s){if(!s)return'';const p=s.split('/');if(p.length!==3)return'';return`20${p[2]}-${p[1]}-${p[0]}`;}
  function fromInputDate(s){if(!s)return'';const p=s.split('-');return`${p[2]}/${p[1]}/${p[2]?p[0].slice(2):''}`;}

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:10,padding:24,width:500,maxWidth:'95vw',maxHeight:'92vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
        <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12,color:'#8a6a20',letterSpacing:1,marginBottom:20,textTransform:'uppercase'}}>
          {isEdit?'✏ Modifier l\'OF':'+ Nouvel OF'}
        </div>

        {/* Info contextuelle (non modifiable en création car définie par le clic) */}
        <div style={{background:'#f5f5f0',borderRadius:6,padding:'8px 12px',marginBottom:14,fontSize:11,color:'#666',display:'flex',gap:16,flexWrap:'wrap'}}>
          <span>🔧 <strong>{f.machine}</strong></span>
          <span>📅 <strong>{f.date}</strong> · {f.half_day===1?'Matin':'PM'}</span>

        </div>

        <div className="frow"><label className="lbl">N° OF</label>
          <input className="inp" value={f.of_number} onChange={e=>s('of_number',e.target.value)} placeholder="2603000001"/>
        </div>

        <div className="frow" style={{position:'relative'}}><label className="lbl">Client</label>
          <input className="inp" value={f.client}
            onChange={e=>onClientChange(e.target.value)}
            onFocus={()=>{if(f.client.length>=1)setShowSugg(true);}}
            onBlur={()=>setTimeout(()=>setShowSugg(false),150)}
            placeholder="PUSTERLA" autoComplete="off"/>
          {showSugg&&clientSugg.length>0&&(
            <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #ddd',borderRadius:'0 0 6px 6px',boxShadow:'0 4px 12px rgba(0,0,0,.1)',zIndex:200,maxHeight:200,overflowY:'auto'}}>
              {clientSugg.map(c=>(
                <div key={c} onMouseDown={()=>{s('client',c);setShowSugg(false);}}
                  style={{padding:'8px 12px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #f0efe9'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#f5f3ed'}
                  onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                  {c}
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="frow"><label className="lbl">Désignation</label>
          <input className="inp" value={f.designation} onChange={e=>s('designation',e.target.value)}/>
        </div>

        <div className="frow" style={{position:'relative'}}>
          <label className="lbl">Couleur</label>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:28,height:28,borderRadius:4,background:displayColor,border:'2px solid #ccc',cursor:'pointer',flexShrink:0,boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}
              onClick={()=>setShowPalette(p=>!p)}/>
            <span style={{fontSize:11,color:'#888'}}>{colorOverride?'Personnalisée':'Auto (désignation)'}</span>
            {colorOverride&&<button onClick={()=>setColorOverride(null)}
              style={{fontSize:10,color:'#666',background:'none',border:'none',cursor:'pointer',padding:0}}>↺ Auto</button>}
          </div>
          {showPalette&&(
            <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,zIndex:300,background:'#fff',
              border:'1px solid #ccc',borderRadius:4,padding:8,boxShadow:'0 4px 16px rgba(0,0,0,.2)'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(10,20px)',gap:2}}>
                {[
                  '#000000','#434343','#666666','#999999','#b7b7b7','#cccccc','#d9d9d9','#efefef','#f3f3f3','#ffffff',
                  '#ff0000','#ff9900','#ffff00','#00ff00','#00ffff','#4a86e8','#0000ff','#9900ff','#ff00ff','#ff4081',
                  '#e06666','#f6b26b','#ffd966','#93c47d','#76d7ea','#6fa8dc','#8e7cc3','#c27ba0','#e66100','#bf9000',
                  '#cc0000','#e69138','#f1c232','#6aa84f','#45818e','#3d85c8','#674ea7','#a64d79','#dd7e6b','#8fce00',
                  '#990000','#b45309','#bf8f00','#38761d','#134f5c','#1155cc','#351c75','#741b47','#783f04','#274e13',
                  '#f4cccc','#fce5cd','#fff2cc','#d9ead3','#d0e0e3','#c9daf8','#d9d2e9','#ead1dc','#fbefd2','#e2efda',
                  '#ea9999','#f9cb9c','#ffe599','#b6d7a8','#a2c4c9','#a4c2f4','#b4a7d6','#d5a6bd','#f0c882','#c6e0b4',
                  '#e06666','#f6b26b','#ffd966','#93c47d','#76d7ea','#6fa8dc','#8e7cc3','#c27ba0','#e8bc5f','#a9d18e',
                  '#cc0000','#e69138','#f1c232','#6aa84f','#45818e','#3d85c8','#674ea7','#a64d79','#c9760d','#548235',
                  '#7f0000','#783f04','#7f6000','#274e13','#0c343d','#1c4587','#20124d','#4c1130','#8b4513','#1e4620',
                ].map(c=>(
                  <div key={c} onClick={()=>{setColorOverride(c);setShowPalette(false);}}
                    title={c}
                    style={{width:20,height:20,background:c,cursor:'pointer',borderRadius:2,
                      border:colorOverride===c?'2px solid #333':'1px solid rgba(0,0,0,.15)',
                      transform:colorOverride===c?'scale(1.2)':'scale(1)',
                      transition:'transform .1s'}}
                    onMouseEnter={e=>e.currentTarget.style.transform='scale(1.25)'}
                    onMouseLeave={e=>e.currentTarget.style.transform=colorOverride===c?'scale(1.2)':'scale(1)'}
                  />
                ))}
              </div>
              <div style={{borderTop:'1px solid #eee',marginTop:8,paddingTop:6}}>
                <button onClick={()=>{setColorOverride(null);setShowPalette(false);}}
                  style={{width:'100%',padding:'5px 8px',borderRadius:4,border:'1px solid #ddd',
                    background:'#f5f5f5',fontSize:11,cursor:'pointer',color:'#555',
                    fontFamily:'IBM Plex Sans,sans-serif',display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:13}}>↺</span> Réinitialiser (couleur auto)
                </button>
              </div>
            </div>
          )}
        </div>
        <div className="g2">
          <div className="frow"><label className="lbl">MAC</label><input className="inp" value={f.mac} onChange={e=>s('mac',e.target.value)}/></div>
          <div className="frow"><label className="lbl">Quantité</label><input className="inp" value={f.qte} onChange={e=>s('qte',e.target.value)}/></div>
        </div>

        <div className="g2">
          <div className="frow"><label className="lbl">Format</label>
            <input className="inp" value={f.format||''} onChange={e=>s('format',e.target.value)} placeholder="ex: A4, 210×297"/>
          </div>
          <div className="frow"><label className="lbl">Départ prévu</label>
            <input type="date" className="inp" value={toInputDate(f.depart)}
              onChange={e=>{
                const v=e.target.value;
                if(!v){s('depart','');return;}
                const p=v.split('-');
                s('depart',`${p[2]}/${p[1]}/${p[0].slice(2)}`);
              }}
              style={{colorScheme:'light'}}/>
          </div>
        </div>

        <div className="frow"><label className="lbl">Observations</label>
          <textarea className="inp" value={getObs(f)} onChange={e=>s('conducteur',encodeColor(colorOverride,e.target.value))}
            rows={2} style={{resize:'vertical',fontFamily:'IBM Plex Sans,sans-serif',fontSize:13}}/>
        </div>

        {!isEdit&&(
          <div style={{background:'#f5f3ed',borderRadius:7,padding:'12px 14px',border:'1px solid #e0ddd5',marginBottom:14}}>
            <label className="lbl" style={{marginBottom:8}}>Durée</label>
            {/* eqFactor: en 2x8, 1 équipe = 1 demi-j ; en 1x8, 1 équipe = 2 demi-j */}
            {(()=>{
              const eqF=mode==='2x8'?1:2;
              const presets=mode==='2x8'?[1,2,3,4,5,6]:[0.5,1,1.5,2,2.5,3];
              return(<>
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                  {presets.map(v=>(
                    <button key={v} type="button" onClick={()=>setHdCount(v*eqF)} style={{
                      padding:'6px 10px',borderRadius:5,border:'2px solid',
                      borderColor:hdCount===v*eqF?'#8a6a20':'#ddd',
                      background:hdCount===v*eqF?'#8a6a20':'#fff',
                      color:hdCount===v*eqF?'#fff':'#555',
                      fontSize:12,fontWeight:700,cursor:'pointer',
                      fontFamily:'IBM Plex Mono,monospace',minWidth:44,
                    }}>{v} éq</button>
                  ))}
                  <div style={{display:'flex',alignItems:'center',gap:6,marginLeft:4}}>
                    <input type="number" min={mode==='2x8'?1:0.5} step={mode==='2x8'?1:0.5} value={hdCount/eqF}
                      onChange={e=>setHdCount(Math.max(mode==='2x8'?1:0.5,parseFloat(e.target.value)||0.5)*eqF)}
                      style={{width:70,padding:'5px 8px',borderRadius:5,border:'2px solid #ddd',
                        background:'#fff',fontSize:13,fontFamily:'IBM Plex Mono,monospace',fontWeight:700}}/>
                    <span style={{fontSize:11,color:'#888'}}>éq</span>
                  </div>
                </div>
                <div style={{fontSize:12,color:'#555',lineHeight:1.6,background:'#fff',borderRadius:5,padding:'7px 10px',border:'1px solid #e8e5e0'}}>
                  <strong>{hdCount/eqF} éq</strong> = <strong>{hdCount} demi-j</strong> = <strong>{hdCount*hpd}h</strong>
                  <span style={{color:'#aaa',fontSize:10,marginLeft:6}}>({f.machine} · {mode==='2x8'?'2×8':'journée'})</span>
                </div>
              </>);
            })()}
          </div>
        )}

        <div className="frow">
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13}}>
            <input type="checkbox" checked={f.bold} onChange={e=>s('bold',e.target.checked)} style={{width:16,height:16,accentColor:'#2d6a4f'}}/>
            Feuilles reçues — prêt à produire (barre verte ✓)
          </label>
        </div>
        <div className="frow">
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13}}>
            <input type="checkbox" checked={getDone(f)} onChange={e=>s('conducteur',encodeColor(colorOverride,getObs(f),e.target.checked))} style={{width:16,height:16,accentColor:'#888'}}/>
            OF terminé (grisé sur le planning)
          </label>
        </div>

        {isEdit&&(
          <div style={{background:'#f5f3ed',borderRadius:7,padding:'12px 14px',border:'1px solid #e0ddd5',marginTop:4,marginBottom:2}}>
            {(()=>{
              const eqF=mode==='2x8'?1:2;
              const presets=mode==='2x8'?[1,2,3,4,5,6]:[0.5,1,1.5,2,2.5,3];
              return(<>
                <div style={{fontSize:10,color:'#8a8880',textTransform:'uppercase',letterSpacing:1,marginBottom:8,fontFamily:'IBM Plex Mono,monospace'}}>
                  Durée
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
                  {presets.map(v=>(
                    <button key={v} type="button" onClick={()=>setNewDur(v*eqF)} style={{
                      padding:'6px 10px',borderRadius:5,border:'2px solid',
                      borderColor:newDur===v*eqF?'#8a6a20':'#ddd',
                      background:newDur===v*eqF?'#8a6a20':'#fff',
                      color:newDur===v*eqF?'#fff':'#555',
                      fontSize:12,fontWeight:700,cursor:'pointer',
                      fontFamily:'IBM Plex Mono,monospace',minWidth:44,
                    }}>{v} éq</button>
                  ))}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <button type="button" onClick={()=>setNewDur(d=>Math.max(eqF*(mode==='2x8'?1:0.5), d-eqF*(mode==='2x8'?1:0.5)))}
                    style={{width:32,height:32,borderRadius:5,border:'2px solid #ddd',background:'#fff',
                      fontSize:18,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                  <input type="number" min={mode==='2x8'?1:0.5} step={mode==='2x8'?1:0.5} value={newDur/eqF}
                    onChange={e=>setNewDur(Math.max(mode==='2x8'?1:0.5,parseFloat(e.target.value)||0.5)*eqF)}
                    style={{width:60,padding:'5px 8px',borderRadius:5,border:'2px solid #ddd',
                      background:'#fff',fontSize:14,fontFamily:'IBM Plex Mono,monospace',fontWeight:700,textAlign:'center'}}/>
                  <span style={{fontSize:13,color:'#888',fontWeight:600}}>éq</span>
                  <button type="button" onClick={()=>setNewDur(d=>d+eqF*(mode==='2x8'?1:0.5))}
                    style={{width:32,height:32,borderRadius:5,border:'2px solid #ddd',background:'#fff',
                      fontSize:18,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                </div>
              </>);
            })()}
          </div>
        )}

        <div style={{display:'flex',gap:8,marginTop:20,justifyContent:'flex-end'}}>
          {isEdit&&<button className="btn btn-danger" onClick={()=>{if(confirm('Supprimer cet OF ?'))onDel(f.id)}}>Supprimer</button>}
          {!isEdit&&onCloseMachine&&(
            <button type="button" onClick={()=>{
              if(confirm('Fermer la machine '+f.machine+' le '+f.date+' ?')){
                onCloseMachine(f.machine,f.date);
                onClose();
              }
            }} style={{
              padding:'6px 13px',borderRadius:5,border:'1px solid #888',
              background:'#f5f0e8',color:'#5a3e00',fontSize:12,fontWeight:600,
              cursor:'pointer',fontFamily:'IBM Plex Sans,sans-serif',
            }}>🔒 Fermer la machine ce jour</button>
          )}
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-primary" onClick={async ()=>{
            const {_showPalette,...fClean}=f;
            await onSave({...fClean,conducteur:encodeColor(colorOverride,getObs(f),getDone(f))},hdCount,modal.data);
            if(isEdit && newDur!==curDuration){
              onResize(modal.data.machine,modal.data.of_number,modal.data.client,modal.data.designation,modal.data.slot,newDur);
            }
          }}>{isEdit?'Enregistrer':'Ajouter'}</button>
        </div>
      </div>
    </div>
  );
}


function SaturdayModal({date, machines, onClose, onSave}){
  const d=pd(date);
  const label=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()]+' '+
    d.getDate()+'/'+(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(2);
  const [sel,setSel]=React.useState([...machines]);

  function toggle(m){
    setSel(s=>s.includes(m)?s.filter(x=>x!==m):[...s,m]);
  }

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',display:'flex',
      alignItems:'center',justifyContent:'center',zIndex:120}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:10,padding:28,width:380,
        boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
        <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12,color:'#8a6a20',
          letterSpacing:1,marginBottom:16,textTransform:'uppercase'}}>
          📅 Samedi {label}
        </div>
        <div style={{fontSize:12,color:'#666',marginBottom:16}}>
          Cochez les machines ouvertes ce samedi :
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
          {MACHINES.map(m=>(
            <label key={m} style={{display:'flex',alignItems:'center',gap:10,
              padding:'8px 12px',borderRadius:6,cursor:'pointer',
              background:sel.includes(m)?'#d4eaff':'#f5f5f0',
              border:sel.includes(m)?'1px solid #90c4f0':'1px solid #e0e0d8',
              transition:'all .15s'}}>
              <input type="checkbox" checked={sel.includes(m)} onChange={()=>toggle(m)}
                style={{width:15,height:15,accentColor:'#104070'}}/>
              <span style={{fontWeight:sel.includes(m)?700:400,fontSize:13}}>{m}</span>
            </label>
          ))}
        </div>
        {sel.length===0&&(
          <div style={{fontSize:11,color:'#c00',marginBottom:12,padding:'6px 10px',
            background:'#fff5f5',borderRadius:5,border:'1px solid #fcc'}}>
            ⚠ Aucune machine sélectionnée — le samedi sera supprimé du planning.
          </div>
        )}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-primary" onClick={()=>onSave(date,sel)}>
            {sel.length===0?'Fermer ce samedi':'Valider'}
          </button>
        </div>
      </div>
    </div>
  );
}

function Settings({sets,onChange,onClose}){
  const [loc,setLoc]=useState(JSON.parse(JSON.stringify(sets)));

  const inp={padding:'6px 8px',borderRadius:5,border:'1px solid #ddd',background:'#f5f5f0',fontSize:12,fontFamily:'IBM Plex Sans,sans-serif'};

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',display:'flex',alignItems:'flex-start',justifyContent:'flex-end',zIndex:100}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',width:480,height:'100vh',overflowY:'auto',boxShadow:'-10px 0 40px rgba(0,0,0,.2)',padding:28}}>
        <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:13,color:'#8a6a20',letterSpacing:1,marginBottom:24,textTransform:'uppercase'}}>⚙ Paramètres</div>



        <div>
          <div style={{fontSize:10,color:'#8a8880',textTransform:'uppercase',letterSpacing:1,marginBottom:8,paddingBottom:6,borderBottom:'1px solid #eee',fontFamily:'IBM Plex Mono,monospace'}}>Régimes horaires</div>
          <div style={{fontSize:11,color:'#888',marginBottom:12,lineHeight:1.5,background:'#f5f5f0',padding:'8px 12px',borderRadius:6}}>
            Le régime 1×8 / 2×8 se paramètre <strong>directement dans le planning</strong> en cliquant sur la rangée grise au-dessus de chaque machine, jour par jour.
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginTop:24}}>
          <button className="btn" onClick={onClose}>Annuler</button>
          <button className="btn btn-primary" onClick={()=>{onChange(loc);onClose();}}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

function ClientsManager({onClose}){
  const [list,setList]=useState([]);
  const [search,setSearch]=useState('');
  const [newName,setNewName]=useState('');
  const [loading,setLoading]=useState(true);
  const [msg,setMsg]=useState('');

  async function load(){
    setLoading(true);
    const data=await sb('clients?order=nom&select=*');
    setList(data||[]);
    setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function add(){
    const n=newName.trim();
    if(!n) return;
    try{
      await sb('clients',{method:'POST',body:JSON.stringify({nom:n}),prefer:'return=minimal'});
      setNewName('');setMsg('✓ Ajouté');setTimeout(()=>setMsg(''),2000);load();
    }catch(e){setMsg('Erreur: '+e.message);}
  }

  async function del(id,nom){
    if(!confirm('Supprimer "'+nom+'" de la liste ?')) return;
    try{
      await sb('clients?id=eq.'+id,{method:'DELETE',prefer:'return=minimal'});
      setMsg('✓ Supprimé');setTimeout(()=>setMsg(''),2000);load();
    }catch(e){setMsg('Erreur: '+e.message);}
  }

  const filtered=list.filter(c=>c.nom.toLowerCase().includes(search.toLowerCase()));

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',display:'flex',alignItems:'flex-start',justifyContent:'flex-end',zIndex:110}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',width:420,height:'100vh',overflowY:'auto',boxShadow:'-10px 0 40px rgba(0,0,0,.2)',padding:28,display:'flex',flexDirection:'column'}}>
        <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:13,color:'#8a6a20',letterSpacing:1,marginBottom:20,textTransform:'uppercase'}}>
          👥 Gestion des clients
        </div>

        {/* Add new */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <input className="inp" placeholder="Nouveau client…" value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&add()}
            style={{flex:1}}/>
          <button className="btn btn-primary" onClick={add}>Ajouter</button>
        </div>
        {msg&&<div style={{fontSize:12,color:msg.startsWith('✓')?'#2d6a4f':'#c00',marginBottom:10}}>{msg}</div>}

        {/* Search */}
        <input className="inp" placeholder="🔍 Rechercher…" value={search}
          onChange={e=>setSearch(e.target.value)}
          style={{marginBottom:12}}/>

        <div style={{fontSize:11,color:'#aaa',marginBottom:8}}>{filtered.length} client{filtered.length>1?'s':''}</div>

        {/* List */}
        <div style={{flex:1,overflowY:'auto'}}>
          {loading ? <div style={{color:'#aaa',fontSize:13}}>Chargement…</div> :
            filtered.map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',padding:'7px 10px',borderRadius:5,marginBottom:3,background:'#f9f9f7',border:'1px solid #eeede8'}}>
                <span style={{flex:1,fontSize:13}}>{c.nom}</span>
                <button onClick={()=>del(c.id,c.nom)}
                  style={{padding:'2px 8px',borderRadius:4,border:'1px solid #fcc',background:'#fff5f5',color:'#c00',fontSize:11,cursor:'pointer'}}>
                  ✕
                </button>
              </div>
            ))
          }
        </div>

        <button className="btn" style={{marginTop:16}} onClick={onClose}>Fermer</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
